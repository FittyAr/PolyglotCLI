name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Package Release
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Workload
        run: dotnet workload install maui-windows

      - name: Build and Publish Server (Web)
        run: |
          dotnet publish PolyglotCLI.web/PolyglotCLI.web.csproj -c Release -r win-x64 --self-contained false -o publish_out

      - name: Build and Publish Desktop (MAUI)
        run: |
          dotnet publish PolyglotCLI.Maui/PolyglotCLI.Maui.csproj -c Release -f net10.0-windows10.0.19041.0 -o publish_maui

      - name: Prepare Assets & Sanitize Configuration
        shell: pwsh
        run: |
          # Funcion para copiar prompts y sanitizar config.json en un directorio de salida
          function Prepare-Output {
              param([string]$OutputDir)
              
              # 1. Copiar prompts
              Copy-Item -Path prompts -Destination "$OutputDir/prompts" -Recurse -Force
              
              # 2. Copiar y sanitizar config.json
              $configPath = "$OutputDir/config.json"
              if (Test-Path $configPath) {
                  try {
                      $cfg = Get-Content -Raw -Path $configPath | ConvertFrom-Json
                      $cfg.ApiKey = ""
                      if ($cfg.ProviderApiKeys) {
                          $cfg.ProviderApiKeys = New-Object PSObject
                      }
                      $cfg.ApiUrl = "http://localhost:1234/v1"
                      
                      $sanitized = ConvertTo-Json $cfg -Depth 10
                      Set-Content -Path $configPath -Value $sanitized -Encoding UTF8
                      Write-Host "config.json sanitizado en $OutputDir"
                  } catch {
                      Write-Host "Fallo al sanitizar config.json en ${OutputDir}: $_"
                  }
              }
          }
          
          Prepare-Output -OutputDir "publish_out"
          Prepare-Output -OutputDir "publish_maui"

      - name: Build MSIX Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          if ($version -match '^\d+\.\d+\.\d+$') {
              $msixVersion = "$version.0"
          } else {
              $msixVersion = "1.0.0.0"
          }
          
          $staging = "msix_staging"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          
          # Usar la salida de MAUI para el paquete MSIX
          Copy-Item -Path publish_maui\* -Destination $staging -Recurse -Force
          Copy-Item -Path manifests/msix/Assets -Destination "$staging/Assets" -Recurse -Force
          Copy-Item -Path manifests/msix/AppxManifest.xml -Destination $staging -Force
          
          $manifestPath = "$staging/AppxManifest.xml"
          $manifestContent = Get-Content -Raw -Path $manifestPath
          
          $identityName = if ("${{ secrets.MS_STORE_IDENTITY_NAME }}") { "${{ secrets.MS_STORE_IDENTITY_NAME }}" } else { "30176FittyDev.PolyglotCLI" }
          $publisher = if ("${{ secrets.MS_STORE_PUBLISHER }}") { "${{ secrets.MS_STORE_PUBLISHER }}" } else { "CN=EDC5BDED-A726-42CD-B98E-5657B88D9832" }
          $publisherName = if ("${{ secrets.MS_STORE_PUBLISHER_DISPLAY_NAME }}") { "${{ secrets.MS_STORE_PUBLISHER_DISPLAY_NAME }}" } else { "FittyAr" }
          
          $manifestContent = $manifestContent -replace 'TEMPLATE_PACKAGE_IDENTITY_NAME', $identityName
          $manifestContent = $manifestContent -replace 'TEMPLATE_PACKAGE_IDENTITY_PUBLISHER', $publisher
          $manifestContent = $manifestContent -replace 'TEMPLATE_PUBLISHER_DISPLAY_NAME', $publisherName
          $manifestContent = $manifestContent -replace 'Version="1.0.0.0"', "Version=`"$msixVersion`""
          
          Set-Content -Path $manifestPath -Value $manifestContent -Encoding UTF8
          
          $makeappx = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "makeappx.exe" -Recurse | Where-Object { $_.FullName -match 'x64' } | Select-Object -First 1).FullName
          if (-not $makeappx) {
              $makeappx = "makeappx"
          }
          
          $msixName = "PolyglotCLI-${{ github.ref_name }}-x64.msix"
          Write-Host "Ejecutando makeappx para empaquetar MSIX..."
          & $makeappx pack /d $staging /p $msixName /o
          Write-Host "Paquete MSIX creado con éxito: $msixName"

      - name: Build MSI Installer (WiX)
        shell: pwsh
        run: |
          dotnet build PolyglotCLI.Wix/PolyglotCLI.Wix.wixproj -c Release
          $version = "${{ github.ref_name }}"
          $msiFile = Get-ChildItem -Path PolyglotCLI.Wix/bin -Filter "PolyglotCLI.Wix.msi" -Recurse | Select-Object -First 1
          if ($msiFile) {
              Copy-Item -Path $msiFile.FullName -Destination "PolyglotCLI-$version-x64.msi" -Force
              Write-Host "Instalador MSI copiado a: PolyglotCLI-$version-x64.msi"
          } else {
              Write-Error "No se encontró el instalador MSI generado."
              exit 1
          }

      - name: Extract Changelog Section
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          try {
              pwsh scripts/extract_changelog.ps1 $version > release_notes.md
              Write-Host "Notas de release extraídas con éxito."
          } catch {
              Set-Content -Path release_notes.md -Value "Consulte el [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) para más detalles sobre los cambios de la versión $version."
              Write-Host "No se pudieron extraer las notas; se utilizó texto de fallback."
          }

      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            PolyglotCLI-*.msix
            PolyglotCLI-*.msi
          body_path: release_notes.md
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
