name: Feature request
description: Suggest an idea or feature for PolyglotCLI.
type: Feature
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please check existing issues/discussions to see if this has already been proposed.
  - type: textarea
    attributes:
      label: Describe the feature or improvement you'd like
      description: Provide a clear and concise description of what you want to happen.
      placeholder: |
        I would like to have support for extracting text from slides (PPTX)...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Use case or problem solved
      description: Explain why this feature is useful and what problems it solves for you.
      placeholder: |
        Currently, to translate presentations, I have to extract the text manually. Direct PPTX support would save a lot of time.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional context or mockups
      description: Add any other context, screenshots, or conceptual workflows.
    validations:
      required: false

